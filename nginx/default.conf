server {
    listen 80;
    server_name cernikiw3.chickenkiller.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name cernikiw3.chickenkiller.com;

    ssl_certificate /etc/letsencrypt/live/cernikiw3.chickenkiller.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cernikiw3.chickenkiller.com/privkey.pem;
    client_max_body_size 50M;

    location / {
        proxy_pass http://nodered:1880;
	proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /face-recognition/ {
        # Usamos la IP de la red privada del host
        
        proxy_pass http://10.35.237.169:8000/; 
        
        # Estas cabeceras le dicen a FastAPI la IP real del usuario, no la de Nginx
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
	
    location /detections/{
	proxy_pass http://10.35.237.105:5000/;
	proxy_set_header Host $host;
	proxy_set_header X-Real-IP $remote_addr;
	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /seaweed/{
	proxy_pass http://10.35.237.38:9333/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
   }	

    location /adminer {
        proxy_pass http://adminer:8080/;
    }


}
